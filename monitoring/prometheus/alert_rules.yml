groups:
  - name: supachat.rules
    rules:
      - alert: BackendDown
        expr: up{job="supachat-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "SupaChat backend is down"
          description: "The backend has been unreachable for more than 1 minute."

      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, rate(supachat_request_duration_seconds_bucket[5m])) > 2
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High API latency detected"
          description: "95th percentile latency is above 2s for the last 5 minutes."

      - alert: HighLLMLatency
        expr: histogram_quantile(0.95, rate(supachat_llm_duration_seconds_bucket[5m])) > 15
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "NL-to-SQL translation is slow"
          description: "HuggingFace LLM p95 latency exceeded 15s for 2 minutes."

      - alert: HighErrorRate
        expr: |
          rate(supachat_requests_total{status=~"5.."}[5m])
          /
          rate(supachat_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate"
          description: "More than 5% of requests are returning 5xx errors."

      - alert: HighActiveRequests
        expr: supachat_active_requests > 20
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Too many concurrent requests"
          description: "More than 20 requests are being processed simultaneously."
