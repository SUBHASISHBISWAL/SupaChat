worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout 65;

    # Gzip compression for static performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80;
        server_name localhost;

        # Health probe endpoint for load balancers
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
        }

        # API Reverse Proxy
        location /api/ {
            proxy_pass http://backend:4000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Metrics for Prometheus
        location /metrics {
            proxy_pass http://backend:4000/metrics;
            access_log off;
        }

        # MCP SSE WebSockets support (Requirement 13.a.ii)
        location /mcp/ {
            proxy_pass http://backend:4000/mcp/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            # SSE requirements
            proxy_buffering off;
            proxy_read_timeout 86400; # Prevent SSE from timing out frequently
        }

        # Direct Static File Serving for SPA
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
